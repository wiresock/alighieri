name: Release

# Build release binaries when a version tag (e.g. v0.1.0) is pushed and attach
# them to a GitHub release. The build jobs run in parallel and only upload
# artifacts; a single release job then publishes them once, so the matrix
# cannot race on creating the release or regenerating its notes. The release
# is created as a draft for review before publishing.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            linker: gcc-aarch64-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install aarch64 cross toolchain (Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
          # Linker for cargo, and CC so cc-rs build scripts (e.g. ring) use the
          # cross compiler instead of the host toolchain.
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
          } >> "$GITHUB_ENV"
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os != 'Windows'
        run: |
          dir="alighieri-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/alighieri" "$dir"/
          cp README.md LICENSE CHANGELOG.md "$dir"/
          tar czf "$dir.tar.gz" "$dir"
          echo "ASSET=$dir.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "alighieri-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/alighieri.exe" $dir/
          Copy-Item README.md, LICENSE, CHANGELOG.md $dir/
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"
          "ASSET=$dir.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Create draft release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
