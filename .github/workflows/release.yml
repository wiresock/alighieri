name: Release

# Build release binaries when a version tag (e.g. v0.1.0) is pushed and attach
# them to a GitHub release. The build jobs run in parallel and only upload
# artifacts; a single release job then publishes them once, so the matrix
# cannot race on creating the release or regenerating its notes. The release
# is created as a draft for review before publishing.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os != 'Windows'
        run: |
          dir="alighieri-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/alighieri" "$dir"/
          cp README.md LICENSE CHANGELOG.md "$dir"/
          tar czf "$dir.tar.gz" "$dir"
          echo "ASSET=$dir.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "alighieri-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/alighieri.exe" $dir/
          Copy-Item README.md, LICENSE, CHANGELOG.md $dir/
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"
          "ASSET=$dir.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
