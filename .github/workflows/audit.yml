name: Security audit

# Run cargo-audit against the RustSec advisory database. Runs when the
# dependency set changes, and weekly so newly disclosed advisories surface
# even without a code change.
on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2
        with:
          tool: cargo-audit
      # Fails on known vulnerabilities; unmaintained/yanked crates are reported
      # as warnings without failing the build.
      - name: Audit dependencies
        run: cargo audit
