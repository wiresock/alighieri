version: 2
updates:
  # Rust dependencies (Cargo.toml / Cargo.lock).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch routine patch/minor bumps into a single PR to cut review noise.
      cargo-minor:
        update-types:
          - minor
          - patch
    ignore:
      # password-hash must track the version argon2 uses (0.5.x today). A
      # standalone bump to 0.6 pulls in a second, incompatible password-hash
      # and breaks the build; let argon2 drive the major. Patch updates within
      # the current series are still allowed.
      - dependency-name: "password-hash"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

  # GitHub Actions used by the CI and release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # The `msrv` CI job pins dtolnay/rust-toolchain to the project's MSRV
      # (1.85.0) on purpose — it must not track the latest toolchain, and the
      # action repo exposes phantom version branches (e.g. 1.100.0) with no
      # matching Rust release. Other uses of this action are @stable.
      - dependency-name: "dtolnay/rust-toolchain"
