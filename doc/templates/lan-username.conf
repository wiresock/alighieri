# Alighieri LAN starter configuration with username/password authentication
#
# Before using this template:
# 1. Replace the LAN CIDR in the client rule with your trusted network.
# 2. Create the userlist with:
#    alighieri user add USER --userlist C:\ProgramData\Alighieri\users
# 3. Restrict file ACLs so only administrators and the service account can
#    read the config and userlist.

internal: 0.0.0.0 port = 1080
external: 0.0.0.0

socksmethod: username
userlist: C:\ProgramData\Alighieri\users

connecttimeout: 30
handshaketimeout: 10
iotimeout: 0
udptimeout: 60
maxconnections: 1024

logoutput: file
logfile: C:\ProgramData\Alighieri\logs\alighieri.log
logformat: text
logrotate.size: 10MiB
logrotate.keep: 5

dns.prefer: system
dns.tryall: false
dns.deny: private linklocal loopback reserved
dns.cachettl: 60

# Optional local metrics endpoint.
# metrics.listen: 127.0.0.1:9090

client pass "trusted-lan" {
    from: 192.168.0.0/16 to: 0.0.0.0/0
}

socks block "deny-loopback" {
    from: 0.0.0.0/0 to: 127.0.0.0/8
}

socks pass "allow-web" {
    from: 0.0.0.0/0 to: 0.0.0.0/0 port = 80-443
    protocol: tcp
    command: connect
}
