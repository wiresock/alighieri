# Alighieri local-only starter configuration
#
# Use this when the SOCKS5 proxy is consumed only by programs on the same
# machine. It keeps the listener on loopback and blocks loopback destinations
# to avoid accidentally using the proxy for local port scans.

internal: 127.0.0.1 port = 1080
external: 0.0.0.0

socksmethod: none

connecttimeout: 30
handshaketimeout: 10
iotimeout: 0
udptimeout: 60
maxconnections: 1024

logoutput: stdout
logformat: text

dns.prefer: system
dns.tryall: false
dns.deny: private linklocal loopback reserved
dns.cachettl: 60

client pass "localhost" {
    from: 127.0.0.1 to: 0.0.0.0/0
}

socks block "deny-loopback" {
    from: 0.0.0.0/0 to: 127.0.0.0/8
}

socks pass "allow-default" {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    protocol: tcp udp
    command: connect udpassociate
}
