# Alighieri example configuration
#
# This is a permissive, single-machine example. For a production deployment
# tighten the client rules, require username authentication, and place the
# userlist file at a path readable only by the proxy process. Generate hashed
# entries with: alighieri user add USER --userlist /etc/alighieri/users

# Address the proxy listens on for incoming client connections.
internal: 127.0.0.1 port = 1080

# Address the proxy uses as the local endpoint for outbound connections.
# 0.0.0.0 means the OS picks the interface based on routing.
external: 0.0.0.0

# Trusted upstream CIDR(s) allowed to send a PROXY protocol header (v1 or v2),
# for running behind a TCP load balancer (HAProxy, nginx, AWS/GCP NLB). The real
# client address from the header then drives client rules, abuse limits, metrics
# and logs. Only connections from these CIDRs are honoured (and must send a
# header); any other source is rejected, so keep the listener firewalled to the
# balancer. Unset disables PROXY protocol.
# proxyprotocol: 10.0.0.0/8

# Authentication methods offered to clients, in preference order.
#   none      — no authentication (RFC 1928, method 0x00)
#   username  — username/password (RFC 1929, method 0x02)
socksmethod: none

# Uncomment to require username/password authentication:
# socksmethod: username
# userlist: /etc/alighieri/users

# Instead of a userlist, credentials can be checked by an external program
# (LDAP/OIDC/PAM/etc.). It receives the username then password as two lines on
# stdin and exits 0 to allow; results are cached like the userlist. With this
# set, the 'username' method does not require a userlist. The value is split on
# whitespace into program + arguments with no quoting, so for a path containing
# spaces point this at a space-free wrapper script.
# socksmethod: username
# auth.command: /usr/local/bin/verify-user

# Timeouts (all values are in seconds).
connecttimeout: 30
handshaketimeout: 10
iotimeout: 0         # 0 disables idle timeout for established TCP relays
udptimeout: 60

# Optional fixed port range for the client-facing UDP relay socket — the
# BND.PORT advertised in the UDP ASSOCIATE reply, where clients send their
# datagrams. Unset = an OS-assigned ephemeral port (the default). Set a range to
# make the inbound UDP ports predictable for firewalling: open exactly this
# range to the proxy. The range must hold at least as many ports as you expect
# concurrent UDP associations; an exhausted range fails new associations.
# udp.portrange: 20000-21000

# Maximum concurrent client TCP connections.
maxconnections: 1024

# Log output sink(s).
logoutput: stdout
# logformat: text
# logfile: /var/log/alighieri/alighieri.log
# logrotate.size: 10MiB
# logrotate.keep: 5

# DNS policy controls for resolved destinations, including IP literals.
# dns.prefer: system     # system, ipv4, or ipv6
# dns.tryall: false      # try all resolved addresses for TCP CONNECT
# dns.deny: private linklocal loopback reserved
# dns.cachettl: 60       # cache domain lookups for this many seconds

# Optional local metrics endpoint. Keep this bound to loopback unless it is
# protected by another access-control layer.
# metrics.listen: 127.0.0.1:9090

# Optional TLS wrapper for client connections. Only enable this when clients
# explicitly support SOCKS5-over-TLS or connect through a local TLS wrapper.
# tls.certfile: /etc/alighieri/tls/server.crt
# tls.keyfile: /etc/alighieri/tls/server.key

# Optional per-client abuse controls. The connection/auth-failure rates are
# fixed windows of LIMIT/WINDOW_SECONDS. Byte sizes accept the same K/M/G
# suffixes as logrotate.
# ratelimit.connectionrate: 60/60
# ratelimit.authfailurerate: 5/300
# ratelimit.concurrentconnections: 10
# byterate is a per-client bandwidth throttle (both directions), written as
# BYTES/WINDOW_SECONDS: it sustains BYTES per WINDOW (10MiB/60 ≈ 170 KiB/s) and
# lets an idle client burst up to BYTES. TCP relays are shaped — slowed with
# backpressure instead of being torn down — while UDP datagrams over the rate
# are dropped (delaying real-time traffic is worse). Leave it unset for no limit.
# ratelimit.byterate: 10MiB/60

# Optional includes. Relative paths are resolved from this file; wildcards are
# supported in the final path component and are loaded in sorted order.
# include: conf.d/*.conf

# ---------------------------------------------------------------------------
# Client rules — evaluated when a TCP connection is accepted.
# First match wins. If none match, the connection is denied.
# ---------------------------------------------------------------------------

client pass "localhost" {
    from: 127.0.0.1 to: 0.0.0.0/0
}

# Uncomment to admit the local LAN:
# client pass "lan" {
#     from: 10.0.0.0/8 to: 0.0.0.0/0
# }

# ---------------------------------------------------------------------------
# SOCKS rules — evaluated after a request has been parsed.
# First match wins. If none match, the request is denied.
# ---------------------------------------------------------------------------

# Prevent proxying to loopback ( SSRF / port-scan mitigation).
socks block "deny-loopback" {
    from: 0.0.0.0/0 to: 127.0.0.0/8
}

# A socks rule 'to:' can match the requested destination hostname (before
# resolution) instead of a CIDR: '.example.com' matches the domain and all
# subdomains, a bare 'example.com' matches that exact host. For example, to
# allowlist only GitHub over TLS, replace the allow-default rule below with:
# socks pass "github" {
#     to: .github.com port = 443
#     command: connect
# }

# A socks rule may add 'bandwidth: BYTES/WINDOW_SECONDS' to throttle each
# matching CONNECT relay (a per-session token bucket, shaped not dropped). A
# session is bounded by both ratelimit.byterate and the matched rule, whichever
# is tighter. For example, to cap each download session to ~5 MiB/s:
# socks pass "downloads" {
#     to: .cdn.example.com port = 443
#     command: connect
#     bandwidth: 5MiB/1
# }

# Allow TCP CONNECT and UDP ASSOCIATE to everywhere else.
socks pass "allow-default" {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    protocol: tcp udp
    command: connect udpassociate
}
